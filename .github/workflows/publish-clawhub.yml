name: Publish ClawHub Skills

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to publish, e.g. 0.1.1"
        required: true
      changelog:
        description: "Release notes shown in ClawHub"
        required: false
        default: "Release from GitHub Actions"
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
      CHANGELOG: ${{ github.event.inputs.changelog || format('Release {0}', github.ref_name) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Validate secret
        shell: bash
        run: |
          test -n "${CLAWHUB_TOKEN}" || { echo "Missing CLAWHUB_TOKEN secret"; exit 1; }

      - name: Publish skills
        shell: bash
        run: |
          chmod +x ./scripts/publish_via_api.sh
          ./scripts/publish_via_api.sh "${{ steps.version.outputs.version }}"
